<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apna Dost — Saheli</title>
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   JioType — ALL weights from JioBharatIQ CDN
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@font-face {
  font-family: 'JioType'; font-weight: 300; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Light.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 400; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 500; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 700; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 900; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 950; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-ExtraBlack.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 400; font-style: italic;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Italic.woff2') format('woff2');
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  font-family: 'JioType', sans-serif;
}
input, textarea, button, select, option, optgroup {
  font-family: 'JioType', sans-serif;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   JDS Design Tokens
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --jds-primary:        #6D17CE;
  --jds-primary-20:     #e8e8fc;
  --jds-secondary:      #f7ab20;
  --jds-secondary-20:   #fef7e9;
  --jds-sparkle:        #1eccb0;
  --jds-sparkle-20:     #e8faf7;
  --jds-error:          #fa2f40;
  --jds-success:        #25ab21;
  --jds-text-high:      #141414;
  --jds-text-med:       #474747;
  --jds-text-low:       rgba(20,20,20,0.55);
  --jds-text-disabled:  rgba(20,20,20,0.38);
  --jds-surface-white:  #ffffff;
  --jds-surface-ghost:  #eeeeef;
  --jds-surface-bold:   #6D17CE;
  --jds-surface-icon:   #e7e9ff;
  --jds-grey-20:        #f5f5f5;
  --jds-grey-40:        #e0e0e0;
  --jds-stroke:         rgba(36,38,43,0.12);
  --jds-space-xs:       8px;
  --jds-space-sm:       12px;
  --jds-space-md:       16px;
  --jds-space-lg:       24px;
  --jds-radius-xs:      4px;
  --jds-radius-sm:      8px;
  --jds-radius-md:      12px;
  --jds-radius-lg:      16px;
  --jds-radius-full:    9999px;
  --jds-opacity-disabled: 0.38;
}

body {
  background: #0f0f1a;
  display: flex;
  min-height: 100vh;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SIDEBAR
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sidebar {
  width: 200px;
  background: var(--jds-surface-white);
  border-right: 1px solid var(--jds-stroke);
  padding: 28px 0 20px;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  display: flex; flex-direction: column;
  z-index: 10;
}
.sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 18px 20px; }
.jio-dot-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 3px; width: 20px; height: 20px; flex-shrink: 0;
}
.jio-dot-grid span { border-radius: 2px; }
.sidebar-app-name { font-size: 13px; font-weight: 700; color: var(--jds-text-high); line-height: 1.2; }
.sidebar-app-sub  { font-size: 10px; font-weight: 500; color: var(--jds-text-low); text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-divider  { height: 1px; background: var(--jds-stroke); margin: 0 0 12px; }
.sidebar-section  { font-size: 10px; font-weight: 700; color: var(--jds-text-low); text-transform: uppercase; letter-spacing: 0.8px; padding: 0 18px 8px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px; min-height: 44px; cursor: pointer;
  color: var(--jds-text-low); border-left: 3px solid transparent;
  font-size: 13px; font-weight: 500;
  transition: all 0.15s ease; user-select: none;
}
.nav-item:hover  { background: var(--jds-grey-20); }
.nav-item.active {
  background: var(--jds-primary-20); color: var(--jds-primary);
  border-left-color: var(--jds-primary); font-weight: 700;
}
.nav-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sidebar-footer {
  margin-top: auto; padding: 12px 18px 0;
  border-top: 1px solid var(--jds-stroke);
  font-size: 11px; color: var(--jds-text-low); line-height: 1.5;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MAIN + PHONE FRAME
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.main {
  margin-left: 200px; flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 24px; min-height: 100vh;
}
.phone-frame {
  width: 360px; height: 800px;
  background: #111; border-radius: 44px; padding: 10px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.07), 0 40px 100px rgba(0,0,0,0.7);
  position: relative; flex-shrink: 0;
}
.phone-screen {
  width: 100%; height: 100%;
  background: var(--jds-surface-white);
  border-radius: 36px; overflow: hidden;
  display: flex; flex-direction: column; position: relative;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STATUS BAR
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.status-bar {
  background: var(--jds-surface-white); height: 52px;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 0 24px 10px; position: relative; flex-shrink: 0;
}
.status-bar::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 110px; height: 26px; background: #111; border-radius: 0 0 20px 20px;
}
.status-time   { font-size: 13px; font-weight: 700; color: var(--jds-text-high); line-height: 1; }
.status-icons  { display: flex; align-items: center; gap: 5px; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HEADER
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.jds-header {
  height: 56px; display: flex; align-items: center;
  padding: 0 var(--jds-space-md);
  background: var(--jds-surface-white);
  border-bottom: 1px solid var(--jds-stroke);
  gap: var(--jds-space-xs); flex-shrink: 0;
}
.jds-header-start { display: flex; align-items: center; gap: var(--jds-space-xs); flex: 1; min-width: 0; }
.jds-header-end   { display: flex; align-items: center; gap: 4px; }
.jds-icon-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent; color: var(--jds-text-high);
  cursor: pointer; border-radius: var(--jds-radius-full); transition: background 0.15s; flex-shrink: 0;
}
.jds-icon-btn:hover { background: var(--jds-surface-ghost); }
.hdr-contact { display: flex; flex-direction: column; justify-content: center; cursor: pointer; min-width: 0; }
.hdr-name    { font-size: 15px; font-weight: 700; color: var(--jds-text-high); line-height: 1.2; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CHAT SCROLL
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.chat-scroll {
  flex: 1; overflow-y: auto;
  padding: var(--jds-space-md) 0 var(--jds-space-xs);
  display: flex; flex-direction: column; gap: 0;
  scroll-behavior: smooth;
}
.chat-scroll::-webkit-scrollbar { display: none; }

/* AI message */
.ai-msg-row {
  display: flex; flex-direction: column; align-items: flex-start;
  gap: 4px; padding: var(--jds-space-xs) var(--jds-space-md);
  animation: msgSlideIn 0.22s ease both;
}
.ai-avatar        { width: 28px; height: 28px; flex-shrink: 0; overflow: hidden; }
.ai-avatar video  { width: 100%; height: 100%; object-fit: cover; display: block; }
.ai-msg-body p    { font-size: 16px; font-weight: 400; color: var(--jds-text-high); line-height: 1.5; margin: 0; }
.ai-msg-time      { display: none; }

/* User message */
.user-msg-row {
  display: flex; justify-content: flex-end;
  padding: var(--jds-space-xs) var(--jds-space-md);
  animation: msgSlideIn 0.22s ease both;
}
.user-msg {
  background: var(--jds-grey-20);
  border-radius: 16px 16px 4px 16px;
  padding: 10px 14px; width: max-content; max-width: 100%;
}
.user-msg p { font-size: 15px; font-weight: 400; color: var(--jds-text-high); line-height: 1.5; margin: 0; }
.user-msg-time { display: none; }

/* Typing indicator */
.typing-row {
  display: flex; align-items: center;
  gap: var(--jds-space-sm); padding: var(--jds-space-xs) var(--jds-space-md);
}
.typing-bubble        { width: 28px; height: 28px; overflow: hidden; }
.typing-bubble video  { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   JDS CHIPS — ConversationalAI_SuggestionChips
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.chips-wrap {
  display: flex; flex-wrap: wrap; gap: var(--jds-space-xs);
  padding: 4px var(--jds-space-md) var(--jds-space-xs);
  animation: fadeDown 0.3s ease both;
}
.chip {
  height: auto; min-width: max-content; padding: 8px 12px;
  border-radius: 9999px; border: 1px solid rgba(49,0,100,0.12);
  background: rgba(255,255,255,0.01);
  font-size: 14px; font-weight: 500; color: #13002d;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: all 0.15s ease;
  display: inline-flex; align-items: center;
  line-height: 1; min-height: 16px;
  font-feature-settings: 'liga' 0;
}
.chip:hover    { background: rgba(49,0,100,0.06); }
.chip.selected { background: #ede7ff; color: #13002d; border-color: transparent; }
.chip.used     { opacity: var(--jds-opacity-disabled); pointer-events: none; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MUSIC PLAYER CARD
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.music-card-wrap {
  padding: 8px 16px;
  animation: fadeDown 0.3s ease both;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   AAJ KI JEET — Celebration card
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.aaj-ki-jeet { padding: 8px 18px; animation: fadeDown 0.3s ease both; }
.aaj-ki-jeet-inner {
  background: #ffffff; border: 1px solid rgba(36,38,43,0.13);
  border-radius: 16px; padding: 16px 18px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.aaj-ki-jeet-icon { width: 56px; height: 56px; overflow: hidden; flex-shrink: 0; }
.aaj-ki-jeet-icon img { width: 132%; height: 132%; margin: -16%; object-fit: cover; }
.aaj-ki-jeet-title {
  font-size: 20px; font-weight: 700; color: #0c0d10;
  line-height: 1.1; text-align: center; white-space: nowrap;
  font-feature-settings: 'liga' 0;
}
.aaj-ki-jeet-body {
  font-size: 16px; font-weight: 400; color: #0c0d10;
  line-height: 1.3; text-align: center;
  font-feature-settings: 'liga' 0;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HEALTH INFO CARD — Neha persona
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.health-card {
  margin: 4px 16px 8px;
  background: #ffffff; border: 1px solid rgba(36,38,43,0.13);
  border-radius: 16px; overflow: hidden;
  animation: fadeDown 0.3s ease both;
  font-family: 'JioType', sans-serif;
}
.health-card-hd {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 14px 10px;
  background: linear-gradient(135deg, #e8faf7 0%, #f0e8ff 100%);
}
.health-card-icon {
  width: 40px; height: 40px; background: #1eccb0; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.health-card-title {
  font-size: 14px; font-weight: 700; color: #0c0d10; line-height: 1.3;
  font-family: 'JioType', sans-serif; font-feature-settings: 'liga' 0;
}
.health-card-sub {
  font-size: 11px; color: rgba(20,20,20,0.55);
  font-family: 'JioType', sans-serif; margin-top: 2px;
}
.health-divider { height: 1px; background: rgba(36,38,43,0.12); }
.health-item {
  padding: 10px 14px; border-bottom: 1px solid rgba(36,38,43,0.08);
  font-family: 'JioType', sans-serif;
}
.health-item:last-child { border-bottom: none; }
.health-item-label {
  font-size: 10px; font-weight: 700; color: #1eccb0;
  text-transform: uppercase; letter-spacing: 0.5px;
  font-family: 'JioType', sans-serif; font-feature-settings: 'liga' 0; margin-bottom: 3px;
}
.health-item-text {
  font-size: 13px; color: #141414; line-height: 1.5;
  font-family: 'JioType', sans-serif; font-feature-settings: 'liga' 0;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BUSINESS PLAN CARD — Sunita Ji persona
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.plan-card {
  margin: 4px 16px 8px;
  background: #ffffff; border: 1px solid rgba(36,38,43,0.13);
  border-radius: 16px; overflow: hidden;
  animation: fadeDown 0.3s ease both;
  font-family: 'JioType', sans-serif;
}
.plan-card-hd {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 14px 10px;
  background: linear-gradient(135deg, #fef7e9 0%, #fff3d6 100%);
}
.plan-card-icon {
  width: 40px; height: 40px; background: #f7ab20; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.plan-card-title {
  font-size: 14px; font-weight: 700; color: #0c0d10; line-height: 1.3;
  font-family: 'JioType', sans-serif; font-feature-settings: 'liga' 0;
}
.plan-card-sub {
  font-size: 11px; color: rgba(20,20,20,0.55);
  font-family: 'JioType', sans-serif; margin-top: 2px;
}
.plan-step {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 14px; border-bottom: 1px solid rgba(36,38,43,0.08);
  font-family: 'JioType', sans-serif;
}
.plan-step:last-of-type { border-bottom: none; }
.plan-step-num {
  width: 22px; height: 22px; background: #f7ab20; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; margin-top: 1px;
  font-family: 'JioType', sans-serif;
}
.plan-step-title {
  font-size: 13px; font-weight: 700; color: #141414;
  font-family: 'JioType', sans-serif; font-feature-settings: 'liga' 0;
}
.plan-step-desc {
  font-size: 12px; color: rgba(20,20,20,0.55); margin-top: 2px;
  font-family: 'JioType', sans-serif; font-feature-settings: 'liga' 0;
}
.plan-total {
  padding: 10px 14px; background: #fef7e9;
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JioType', sans-serif;
}
.plan-total-label { font-size: 13px; font-weight: 700; color: #141414; font-family: 'JioType', sans-serif; font-feature-settings: 'liga' 0; }
.plan-total-val   { font-size: 15px; font-weight: 700; color: #f7ab20; font-family: 'JioType', sans-serif; font-feature-settings: 'liga' 0; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HEALTH JAANKARI LABEL — Figma 7033:7029
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.health-jaankari-label {
  padding: 8px 18px;
  font-family: 'JioType', sans-serif;
  font-size: 16px; font-weight: 700; color: #0c0d10;
  line-height: 1.3; font-feature-settings: 'liga' 0;

}
.breathing-circle-wrap {
  width: 110px; height: 110px;
  display: flex; align-items: center; justify-content: center; position: relative;
}
.breathing-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid rgba(109,23,206,0.25);
  animation: breatheRing 8s ease-in-out infinite;
}
.breathing-circle {
  width: 80px; height: 80px; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #e8e1ff 20%, #6D17CE 100%);
  display: flex; align-items: center; justify-content: center;
  animation: breathePulse 8s ease-in-out infinite;
}
.breathing-phase {
  font-size: 11px; font-weight: 700; color: #fff; text-align: center;
  font-family: 'JioType', sans-serif; font-feature-settings: 'liga' 0;
  line-height: 1.2;

  font-family: 'JioType', sans-serif; font-feature-settings: 'liga' 0;
}
@keyframes breathePulse {
  0%,100% { transform: scale(1); }
  25%,50% { transform: scale(1.28); }
}
@keyframes breatheRing {
  0%,100% { transform: scale(1); opacity: 0.3; }
  25%,50% { transform: scale(1.5); opacity: 0.6; }
}

}

      res();

  });

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SPEAK / STOP TOGGLE
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function startSpeaking(){
  const btn = document.getElementById('speakBtn');
  btn.classList.add('speaking');
  btn.onclick = stopSpeaking;
  btn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg> Stop`;
  const row = document.createElement('div');
  row.className = 'listening-row'; row.id = 'listeningRow';
  row.innerHTML = `<div class="listening-bot"><video src="avatars/listening.mp4" autoplay loop muted playsinline></video></div><span class="listening-text">Listening...</span>`;
  cs.appendChild(row); scroll();
}

function stopSpeaking(){
  const btn = document.getElementById('speakBtn');
  btn.classList.remove('speaking');
  btn.onclick = startSpeaking;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M12 2a1 1 0 00-1 1v18a1 1 0 002 0V3a1 1 0 00-1-1zM4 9a1 1 0 00-1 1v4a1 1 0 102 0v-4a1 1 0 00-1-1zm4-3a1 1 0 00-1 1v10a1 1 0 102 0V7a1 1 0 00-1-1zm12 3a1 1 0 00-1 1v4a1 1 0 002 0v-4a1 1 0 00-1-1zm-4-3a1 1 0 00-1 1v10a1 1 0 002 0V7a1 1 0 00-1-1z" fill="currentColor"/></svg> Speak`;
  const lr = document.getElementById('listeningRow'); if(lr) lr.remove();
  sendText();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SEND TEXT — routes Speak by persona + act
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function sendText(){
  if(persona === 'neha'){
    if(act === 3){ await nehaSpeak1(); return; }
    if(act === 4){ await nehaSpeak2(); return; }
    if(act === 5){ await nehaSpeak3(); return; }
  } else if(persona === 'sunita'){
    if(act === 2){ await sunitaSpeak1(); return; }
    if(act === 3){ await sunitaSpeak2(); return; }
  } else if(persona === 'meera'){
    if(act === 2){ await meeraSpeak1(); return; }
    if(act === 3){ await meeraSpeak2(); return; }
    if(act === 4){ await meeraSpeak3(); return; }
  }
  // typed text fallback
  const inp = document.getElementById('chatInput');
  const t = inp.value.trim(); if(!t) return;
  inp.value = '';
  document.getElementById('chatPlaceholder').style.display = 'block';
  document.getElementById('speakBtn').style.display = 'flex';
  document.getElementById('sendBtn').classList.remove('visible');
  inp.style.height = 'auto';
  addUserMsg(t); showTyping();
  await new Promise(r=>setTimeout(r,1400)); hideTyping();
  addAiMsg('Sun rahi hoon... bolo aur.');
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CHAT INPUT HELPERS
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function onInputChange(el){
  const ph   = document.getElementById('chatPlaceholder');
  const sb   = document.getElementById('speakBtn');
  const send = document.getElementById('sendBtn');
  el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px';
  if(el.value.trim()){
    ph.style.display = 'none'; sb.style.display = 'none'; send.classList.add('visible');
  } else {
    ph.style.display = 'block'; sb.style.display = 'flex'; send.classList.remove('visible');
  }
}
function onEnterKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendText(); } }
