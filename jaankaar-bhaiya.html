<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaankaar Bhaiya | JioBharatIQ</title>
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   JioType — ALL 7 weights from JioBharatIQ CDN
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@font-face {
  font-family: 'JioType'; font-weight: 300; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Light.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 400; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 500; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 700; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 900; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 950; font-style: normal;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-ExtraBlack.woff2') format('woff2');
}
@font-face {
  font-family: 'JioType'; font-weight: 400; font-style: italic;
  src: url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Italic.woff2') format('woff2');
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  font-family: 'JioType', sans-serif;
  font-feature-settings: 'liga' 0;
}
input, textarea, button, select { font-family: 'JioType', sans-serif; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   JDS Design Tokens
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --primary:        #6D17CE;
  --primary-20:     #ede7ff;
  --primary-30:     #c4a0f0;
  --secondary-20:   #fef7e9;
  --secondary-30:   #ffe3ae;
  --secondary-50:   #f7ab20;
  --secondary-60:   #ac660c;
  --sparkle-20:     #e8faf7;
  --sparkle-30:     #a7f6e9;
  --sparkle-50:     #1eccb0;
  --sparkle-60:     #1e7b74;
  --error:          #fa2f40;
  --warning:        #f06d0f;
  --success:        #25ab21;
  --text-high:      #141414;
  --text-med:       #474747;
  --text-low:       rgba(20,20,20,0.55);
  --text-disabled:  rgba(25,27,30,0.38);
  --surface-white:  #ffffff;
  --surface-ghost:  #eeeeef;
  --surface-bold:   #6D17CE;
  --grey-20:        #f5f5f5;
  --grey-40:        #e0e0e0;
  --grey-60:        #b5b5b5;
  --stroke:         rgba(36,38,43,0.12);
  --chip-border:    rgba(49,0,100,0.12);
  --chip-text:      #13002d;
  --chip-sel-bg:    #ede7ff;
}

body {
  background: #0f0f1a;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px 0;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PHONE FRAME
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.phone-frame {
  width: 360px;
  height: 800px;
  border-radius: 40px;
  border: 8px solid #1c1c1e;
  overflow: hidden;
  position: relative;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  flex-shrink: 0;
}
.phone-screen {
  width: 100%; height: 100%;
  background: var(--surface-white);
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* Status Bar */
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 20px 8px;
  flex-shrink: 0;
}
.status-time { font-size: 13px; font-weight: 700; color: var(--text-high); }
.status-icons { display: flex; align-items: center; gap: 6px; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HEADER
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.jds-header {
  height: 56px; flex-shrink: 0;
  display: flex; align-items: center;
  padding: 0 12px 0 8px;
  border-bottom: 1px solid var(--stroke);
  background: var(--surface-white);
  gap: 8px;
}
.hdr-back {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: none; cursor: pointer;
  color: var(--text-high); flex-shrink: 0;
}
.hdr-info { flex: 1; min-width: 0; }
.hdr-name { font-size: 16px; font-weight: 700; color: var(--text-high); }


/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CHAT SCROLL
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.chat-scroll {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column;
  gap: 4px; padding: 12px 0 8px;
  scroll-behavior: smooth;
}
.chat-scroll::-webkit-scrollbar { width: 3px; }
.chat-scroll::-webkit-scrollbar-thumb { background: var(--grey-40); border-radius: 9999px; }

/* AI message */
.ai-msg-row {
  display: flex; flex-direction: column;
  align-items: flex-start; padding: 4px 16px;
  animation: fadeUp 0.3s ease both;
}
.ai-avatar {
  width: 28px; height: 28px; border-radius: 4px;
  overflow: hidden; flex-shrink: 0; margin-bottom: 4px;
}
.ai-avatar video { width: 100%; height: 100%; object-fit: cover; display: block; }
.ai-msg-body p {
  font-size: 15px; font-weight: 400;
  color: var(--text-high); line-height: 1.5; margin: 0;
}

/* User message */
.user-msg-row {
  display: flex; justify-content: flex-end;
  padding: 4px 16px;
  animation: fadeUp 0.22s ease both;
}
/* Voice message bubble */
.voice-msg-row {
  display: flex; justify-content: flex-end;
  padding: 4px 16px;
  animation: fadeUp 0.22s ease both;
}
.voice-msg-pill {
  background: #E4D8FF;
  border-radius: 16px;
  padding: 2px 8px;
  display: flex; align-items: center; gap: 4px;
  width: 100%; max-width: 300px;
  min-height: 45px; overflow: hidden;
}
.voice-play-btn {
  background: #E4D8FF; border: none; border-radius: 999px;
  padding: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.voice-waveform {
  flex: 1; height: 41px; position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 2px;
  padding: 2px 0;
  box-sizing: border-box;
}
.voice-waveform-bar {
  width: 2px; background: #3900AD; border-radius: 999px; flex-shrink: 0;
}
.voice-timer {
  font-size: 14px; font-weight: 400; color: #0c0d10;
  white-space: nowrap; font-family: 'JioType', sans-serif;
}
.user-msg {
  background: var(--grey-20);
  border-radius: 16px 16px 4px 16px;
  padding: 10px 14px; width: max-content; max-width: 100%;
}
.user-msg p { font-size: 15px; font-weight: 400; color: var(--text-high); line-height: 1.5; margin: 0; }

/* Typing indicator */
.typing-row {
  display: flex; align-items: center;
  padding: 4px 16px; gap: 8px;
}
.typing-bubble {
  width: 28px; height: 28px; border-radius: 4px; overflow: hidden;
}
.typing-bubble video { width: 100%; height: 100%; object-fit: cover; display: block; }

/* Listening indicator in chat */
.listening-row {
  display: flex; align-items: center;
  gap: 8px; padding: 4px 16px;
  animation: fadeUp 0.2s ease both;
}
.listening-avatar { width: 28px; height: 28px; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
.listening-avatar video { width: 100%; height: 100%; object-fit: cover; display: block; }
.listening-text { font-size: 14px; font-weight: 400; color: #191b1e; opacity: 0.4; }

/* Chips */
.chips-wrap {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 4px 16px 8px;
  animation: fadeUp 0.3s ease both;
}
.chip {
  padding: 8px 12px; border-radius: 9999px;
  border: 1px solid var(--chip-border);
  background: rgba(255,255,255,0.01);
  color: var(--chip-text);
  font-size: 14px; font-weight: 500;
  white-space: nowrap; flex-shrink: 0; min-width: max-content;
  cursor: pointer; transition: background 0.15s;
}
.chip.sel {
  background: var(--chip-sel-bg); color: var(--chip-text);
  border-color: transparent;
}
.chips-wrap.off { pointer-events: none; opacity: 0.38; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CARDS
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.card {
  border-radius: 16px; padding: 20px;
  animation: fadeUp 0.4s ease;
  align-self: flex-start;
  max-width: 92%; width: calc(100% - 32px);
  margin: 4px 16px;
  font-family: 'JioType', sans-serif;
}
.card .label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 8px; font-family: 'JioType', sans-serif;
}
/* context */
.card.ctx { background: var(--secondary-20); border: 1px solid var(--secondary-30); }
.card.ctx .label { color: var(--secondary-60); }
.card.ctx .body { font-size: 14px; font-weight: 500; line-height: 1.5; color: var(--text-high); }
/* goal breakdown */
.card.goal { background: var(--surface-ghost); border: 1px solid var(--stroke); }
.card.goal .label { color: var(--text-low); }
.card.goal .big { font-size: 32px; font-weight: 900; color: var(--text-high); margin: 8px 0; }
.card.goal .sub { font-size: 13px; font-weight: 700; color: var(--text-low); margin-bottom: 12px; }
.card.goal .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.card.goal .bar-wrap { flex: 1; height: 6px; border-radius: 9999px; background: var(--grey-40); overflow: hidden; }
.card.goal .bar-fill { height: 100%; border-radius: 9999px; transition: width 1s ease; }
.card.goal .rname { font-size: 13px; font-weight: 500; color: var(--text-high); width: 90px; flex-shrink: 0; }
.card.goal .rval { font-size: 13px; font-weight: 700; color: var(--text-high); width: 55px; text-align: right; flex-shrink: 0; }
/* voice */
.card.voice { background: var(--primary-20); border: 1px solid var(--primary-30); text-align: center; padding: 24px 20px; }
.card.voice .label { color: var(--primary); }
.card.voice .wave { display: flex; justify-content: center; gap: 3px; height: 40px; align-items: center; margin: 12px 0; }
.card.voice .wave .bar { width: 3px; border-radius: 9999px; background: var(--primary); }
.card.voice .rec-status { font-size: 14px; font-weight: 700; color: var(--primary); }
.card.voice .play-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--primary); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  margin: 12px auto; border: none; cursor: pointer;
}
/* spending */
.card.spend { background: var(--surface-ghost); border: 1px solid var(--stroke); }
.card.spend .label { color: var(--text-low); }
.card.spend .srow { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
.card.spend .sdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.card.spend .sname { font-size: 14px; font-weight: 500; color: var(--text-high); flex: 1; }
.card.spend .sval { font-size: 14px; font-weight: 700; color: var(--text-high); }
.card.spend .sbar { height: 4px; border-radius: 9999px; margin: 2px 0 8px 20px; transition: width 1s ease; }
.card.spend .stotal { display: flex; justify-content: space-between; padding-top: 12px; margin-top: 8px; border-top: 1.5px solid var(--grey-40); font-size: 14px; font-weight: 700; }
.card.spend .stotal .tv { color: var(--error); }
/* progress */
.card.prog { background: var(--sparkle-20); border: 1px solid var(--sparkle-30); text-align: center; }
.card.prog .label { color: var(--sparkle-60); }
.card.prog .ring-wrap { width: 120px; height: 120px; margin: 12px auto; position: relative; }
.card.prog .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.card.prog .ring-bg { fill: none; stroke: var(--sparkle-30); stroke-width: 8; }
.card.prog .ring-fg { fill: none; stroke: var(--sparkle-50); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1.5s ease; }
.card.prog .ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.card.prog .ring-amt { font-size: 22px; font-weight: 900; color: var(--text-high); }
.card.prog .ring-sub { font-size: 11px; font-weight: 700; color: var(--text-low); }
.card.prog .prog-info { font-size: 13px; font-weight: 500; color: var(--text-low); margin-top: 8px; }
/* nudge */
.card.nudge { background: var(--surface-white); border: 1.5px solid var(--warning); display: flex; align-items: center; gap: 12px; }
.card.nudge .nicon { width: 36px; height: 36px; border-radius: 12px; background: var(--secondary-20); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card.nudge .ntext { font-size: 14px; font-weight: 700; color: var(--text-high); line-height: 1.4; }
/* time skip */
.card.skip { background: #1c1c2e; border: none; text-align: center; padding: 24px 20px; align-self: center; max-width: 85%; margin: 4px auto; }
.card.skip .skip-icon { font-size: 20px; font-weight: 900; color: var(--grey-60); margin-bottom: 8px; }
.card.skip .skip-text { font-size: 17px; font-weight: 900; color: #ffffff; }
.card.skip .skip-bar { width: 100%; height: 4px; border-radius: 9999px; background: rgba(255,255,255,0.15); margin-top: 12px; overflow: hidden; }
.card.skip .skip-fill { height: 100%; border-radius: 9999px; background: var(--sparkle-50); transition: width 1.2s ease; }
/* milestone */
.card.mile { background: linear-gradient(135deg, var(--sparkle-20), var(--secondary-20)); border: 1px solid var(--sparkle-30); text-align: center; padding: 24px 20px; }
.card.mile .label { color: var(--sparkle-60); }
.card.mile .mile-amt { font-size: 36px; font-weight: 900; color: var(--text-high); margin: 8px 0; }
.card.mile .mile-sub { font-size: 14px; font-weight: 700; color: var(--sparkle-60); }
/* journey */
.card.journey { background: var(--surface-ghost); border: 1px solid var(--stroke); }
.card.journey .label { color: var(--text-low); }
.card.journey .jline { display: flex; align-items: center; gap: 0; margin: 12px 0; }
.card.journey .jdot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--sparkle-50); }
.card.journey .jdot.done { background: var(--sparkle-50); }
.card.journey .jdot.next { border-style: dashed; border-color: var(--grey-60); }
.card.journey .jseg { flex: 1; height: 2px; background: var(--sparkle-50); }
.card.journey .jseg.next { background: var(--grey-40); }
.card.journey .jlabels { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: var(--text-low); }
.card.journey .jlabels .jdone { color: var(--sparkle-60); }
/* celebration */
.card.celeb { background: var(--secondary-20); border: 1px solid var(--secondary-30); text-align: center; padding: 24px; }
.card.celeb .label { color: var(--secondary-60); }
.card.celeb .cquote { font-size: 15px; font-weight: 700; line-height: 1.6; color: var(--text-high); margin: 12px 0; }
.card.celeb .csign { font-size: 13px; font-weight: 500; color: var(--text-low); }
/* summary */
.card.summary { background: var(--surface-ghost); border: 1px solid var(--stroke); }
.card.summary .label { color: var(--text-low); }
.card.summary .stxt { font-size: 14px; font-weight: 500; color: var(--text-high); line-height: 1.5; margin: 8px 0; }
.card.summary .stime { font-size: 13px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INPUT BAR — JDS ChatInput
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sticky-footer {
  flex-shrink: 0;
  background: var(--surface-white);
  padding: 8px 16px 24px;
}
.jds-chat-input {
  background: var(--surface-ghost);
  border-radius: 24px; padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
}
.chat-input-text { position: relative; padding: 0 8px; }
.chat-input-placeholder {
  font-size: 16px; font-weight: 400;
  color: rgba(25,27,30,0.65); pointer-events: none;
  position: absolute; top: 0; left: 8px;
}
.chat-input-real {
  width: 100%; border: none; background: none;
  font-size: 16px; font-weight: 400; color: var(--text-high);
  outline: none; resize: none; min-height: 24px;
}
.chat-input-actions {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 4px;
}
.chat-action-start, .chat-action-end { display: flex; align-items: center; gap: 8px; }
.jds-action-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  color: var(--primary);
}
.jds-speak-btn {
  background: var(--primary); color: #ffffff; border: none;
  border-radius: 9999px; padding: 8px 16px;
  font-size: 14px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: opacity 0.15s;
}
.jds-speak-btn:active { opacity: 0.85; }
.jds-speak-btn.listening {
  background: #333;
}
/* Recording state */
.rec-wave-wrap {
  display: none;
  background: #cce8f9;
  border-radius: 16px;
  padding: 0 14px;
  height: 45px;
  align-items: center;
  gap: 10px;
}
.rec-bars {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 2px;
  height: 36px;
  overflow: hidden;
}
.rec-bar {
  flex-shrink: 0;
  width: 3px;
  background: #f6a623;
  border-radius: 2px;
  animation: recPulse 0.7s ease-in-out infinite;
}
@keyframes recPulse {
  0%,100% { height: 4px; }
  50% { height: 30px; }
}
.rec-timer {
  font-size: 13px; font-weight: 500; color: #141414; white-space: nowrap;
}
/* Circle send button (recording mode) */
.jds-send-circle {
  display: none;
  width: 36px; height: 36px;
  background: var(--primary);
  border-radius: 50%;
  border: none; cursor: pointer;
  align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

/* ===== GLOBALS ===== */
const chat = document.getElementById('chat');
const avatarV = document.getElementById('avatarVideo');

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function showSnackbar(text, duration=2000){
    const s = document.getElementById('snackbar');
    s.textContent = text;
    s.classList.add('show');
    setTimeout(()=>s.classList.remove('show'), duration);
}
function scroll(){ setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; },60); }

/* ===== TYPING ===== */
function showTyp(){
    const r = document.createElement('div');
    r.className = 'typing-row'; r.id = 'typRow';
    r.innerHTML = `<div class="typing-bubble"><video src="avatars/thinking.mp4" autoplay loop muted playsinline></video></div>`;
    chat.appendChild(r); scroll();
}
function hideTyp(){ const t=document.getElementById('typRow'); if(t)t.remove(); }

/* ===== MESSAGES ===== */
async function addAI(text, delay=700, showAvatar=true){
    showTyp();
    await wait(delay);
    hideTyp();
    const d = document.createElement('div');
    d.className = 'ai-msg-row';
    d.innerHTML = `${showAvatar?`<div class="ai-avatar"><video src="avatars/idle.mp4" autoplay loop muted playsinline></video></div>`:''}
        <div class="ai-msg-body"><p>${text}</p></div>`;
    chat.appendChild(d); scroll();
    return d;
}

function addVoiceMsg(secs){
    const m = String(Math.floor(secs/60)).padStart(2,'0');
    const s = String(secs%60).padStart(2,'0');
    const timer = m+':'+s;
    // waveform bar heights (simplified version of Figma waveform)
    const heights = [4,4,4,4,4,4,4,4,4,4,4,4,4,4,16,25,32,41,32,25,16,
                     10,14,22,18,20,14,22,26,32,38,20,14,4,4,20,32,41,32,
                     20,14,22,18,20,14,10,16,25,32,25,16,10,4,4,4,4,4,4];
    const d = document.createElement('div');
    d.className = 'voice-msg-row';
    let bars = heights.map(h=>`<div class="voice-waveform-bar" style="height:${h}px;"></div>`).join('');
    d.innerHTML = `<div class="voice-msg-pill">
      <button class="voice-play-btn">
        <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
          <path d="M19.15 10.36l-10-7A2 2 0 006 5v14a2 2 0 003.15 1.64l10-7a2 2 0 000-3.28z" fill="#6D17CE"/>
        </svg>
      </button>
      <div class="voice-waveform">${bars}</div>
      <span class="voice-timer">${timer}</span>
    </div>`;
    chat.appendChild(d); scroll();
}

async function addUser(text){
    if(!text) return;
    const d = document.createElement('div');
    d.className = 'user-msg-row';
    d.innerHTML = `<div class="user-msg"><p>${text}</p></div>`;
    chat.appendChild(d); scroll();
}

            b.className = 'chip';
            b.style.width = 'max-content';
            b.textContent = o;
            b.onclick = ()=>{
                // lock width before selecting
                b.style.width = b.offsetWidth+'px';
                row.classList.add('off');
                b.classList.add('sel');
                addUser(o);
                res(o);
            };
            row.appendChild(b);
        });
        chat.appendChild(row); scroll();
    });
}

/* ===== CARD ===== */
async function addCard(html, delay=700){
    showTyp();
    await wait(delay);
    hideTyp();
    const w = document.createElement('div');
    w.innerHTML = html;
    const c = w.firstElementChild;
    chat.appendChild(c); scroll();
    return c;
}

/* ===== VOICE RECORDING ANIMATION ===== */
function animateRecording(el){
    const wave = el.querySelector('#recWave');
    const status = el.querySelector('#recStatus');
    if(!wave) return Promise.resolve();
    for(let i=0;i<15;i++){
        const b = document.createElement('div');
        b.className = 'bar';
        b.style.height = (8+Math.random()*28)+'px';
        b.style.animation = `waveAnim ${0.6+Math.random()*0.6}s ease-in-out infinite`;
        b.style.animationDelay = (i*0.08)+'s';
        wave.appendChild(b);
    }
    return wait(2500).then(()=>{
        wave.querySelectorAll('.bar').forEach(b=>{ b.style.animation='none'; b.style.height='4px'; b.style.background='var(--sparkle-50)'; });
        status.textContent='Saved!'; status.style.color='var(--sparkle-50)';
    });
}

function animatePlayback(el){
    const wave = el.querySelector('#playWave');
    if(!wave) return Promise.resolve();
    for(let i=0;i<15;i++){
        const b=document.createElement('div'); b.className='bar'; b.style.height='4px'; wave.appendChild(b);
    }
    const btn=el.querySelector('#playBtn'); if(btn) btn.style.display='none';
    wave.querySelectorAll('.bar').forEach((b,i)=>{
        b.style.animation=`waveAnim ${0.5+Math.random()*0.5}s ease-in-out infinite`;
        b.style.animationDelay=(i*0.07)+'s';
    });
    return wait(3000).then(()=>{
        wave.querySelectorAll('.bar').forEach(b=>{ b.style.animation='none'; b.style.height='4px'; b.style.background='var(--sparkle-50)'; });
    });
}


/* ===== FLOW ENGINE ===== */
async function processStep(step){
    if(step.t==='ai'){
        await addAI(step.text, step.delay ?? 800, !step.noAvatar);
    } else if(step.t==='speak'){
        await waitForSpeak(step.text);
    } else if(step.t==='micRecord'){
        await waitForMicRecord();
    } else if(step.t==='chips'){
        return await addChips(step.opts);
    } else if(step.t==='voiceMsg'){
        await wait(600);
        addVoiceMsg(step.secs ?? 8);
    } else if(step.t==='snackbar'){
        await wait(step.delay ?? 0);
        showSnackbar(step.text, step.duration ?? 2000);
        await wait(step.duration ?? 2000);
    } else if(step.t==='card'){
        const el = await addCard(renderCard(step.card, step), step.delay ?? 700);
        if(step.card==='voiceRecord') await animateRecording(el);
        if(step.card==='voicePlay') await animatePlayback(el);
        if(step.card==='progress'){
            await wait(100);
            const fg=el.querySelector('.ring-fg');
            if(fg) fg.style.strokeDashoffset=326.73*(1-(step.pct||55)/100);
        }
    }
    return null;
}

async function runSequence(steps){
    let i=0;
    while(i<steps.length){
        const step=steps[i];
        if(step.t==='branch'){ i++; continue; }
        const result = await processStep(step);
        if(step.t==='chips' && result){
            const next=steps[i+1];
            if(next && next.t==='branch' && next.map[result]){
                await runSequence(next.map[result]); i+=2; continue;
            }
        }
        i++;
    }
}

async function runTimeSkip(data, id){
    const el = await addCard(renderCard('skip',{...data,id}),500);
    await wait(300);
    const fill=document.getElementById('skipFill'+id);
    if(fill) fill.style.width=data.pct+'%';
    await wait(1800);
}

async function runFlow(){
    chat.querySelectorAll('.ai-msg-row,.user-msg-row,.chips-wrap,.card,.typing-row,.listening-row').forEach(e=>e.remove());
    const F=FLOW_AMIT;
    await wait(600);
    await runSequence(F.act1);
    await wait(1000);
    showSnackbar('7 hafte baad', 2000);
    await wait(2000);
    await runSequence(F.act2);
}


/* ===== MIC RECORDING INTERACTION ===== */
let _micResolve = null;
let _recInterval = null;
let _recSecs = 0;

function onMicClick(){
    if(!_micResolve) return; // only active when flow is waiting
    // Show recording state
    document.getElementById('chatTextRow').style.display = 'none';
    document.getElementById('recWaveWrap').style.display = 'flex';
    document.getElementById('micBtn').style.display = 'none';
    document.getElementById('speakBtn').style.display = 'none';
    document.getElementById('trashBtn').style.display = 'flex';
    document.getElementById('sendCircleBtn').style.display = 'flex';
    // Build bars
    const barsEl = document.getElementById('recBarsEl');
    barsEl.innerHTML = '';
    for(let i=0;i<32;i++){
        const b = document.createElement('div');
        b.className = 'rec-bar';
        b.style.animationDelay = (Math.random()*0.65).toFixed(2) + 's';
        barsEl.appendChild(b);
    }
    // Start timer
    _recSecs = 0;
    const timerEl = document.getElementById('recTimerEl');
    timerEl.textContent = '00:00';
    _recInterval = setInterval(()=>{
        _recSecs++;
        const m = String(Math.floor(_recSecs/60)).padStart(2,'0');
        const s = String(_recSecs%60).padStart(2,'0');
        timerEl.textContent = m+':'+s;
    }, 1000);
    // Circle send btn confirms recording
    document.getElementById('sendCircleBtn').onclick = ()=>{
        const secs = _recSecs;
        stopRecordingUI();
        addVoiceMsg(secs || 8);
        if(_micResolve){ const r=_micResolve; _micResolve=null; r(); }
    };
}

function stopRecordingUI(){
    clearInterval(_recInterval);
    document.getElementById('recWaveWrap').style.display = 'none';
    document.getElementById('chatTextRow').style.display = '';
    document.getElementById('micBtn').style.display = 'flex';
    document.getElementById('speakBtn').style.display = 'flex';
    document.getElementById('trashBtn').style.display = 'none';
    document.getElementById('sendCircleBtn').style.display = 'none';
    document.getElementById('sendCircleBtn').onclick = null;
}

function cancelRecording(){
    stopRecordingUI();
    _micResolve = null;
}

function waitForMicRecord(){
    return new Promise(res=>{ _micResolve = res; });
}

/* ===== SPEAK INTERACTION ===== */
let _speakResolve = null;

function onSpeak(){
    if(_speakResolve){
        const res = _speakResolve;
        _speakResolve = null;
        resetSpeakBtn();
        res();
    }
}

function waitForSpeak(text){
    return new Promise(res=>{
        // Step 1: wait for Speak click → show listening
        _speakResolve = ()=>{
            const btn = document.getElementById('speakBtn');
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M6 6h12v12H6z" fill="currentColor"/></svg> Stop`;
            const lr = document.createElement('div');
            lr.className = 'listening-row'; lr.id = 'listenRow';
            lr.innerHTML = `<div class="listening-avatar"><video src="avatars/listening.mp4" autoplay loop muted playsinline></video></div>
                <span class="listening-text">Listening...</span>`;
            chat.appendChild(lr); scroll();
            // Step 2: wait for Stop click → show message
            _speakResolve = ()=>{
                const l = document.getElementById('listenRow'); if(l) l.remove();
                resetSpeakBtn();
                addUser(text);
                res();
            };
        };
    });
}

function resetSpeakBtn(){
    const btn = document.getElementById('speakBtn');
    btn.style.background = 'var(--primary)';
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M12 2a1 1 0 00-1 1v18a1 1 0 002 0V3a1 1 0 00-1-1zM4 9a1 1 0 00-1 1v4a1 1 0 102 0v-4a1 1 0 00-1-1zm4-3a1 1 0 00-1 1v10a1 1 0 102 0V7a1 1 0 00-1-1zm12 3a1 1 0 00-1 1v4a1 1 0 002 0v-4a1 1 0 00-1-1zm-4-3a1 1 0 00-1 1v10a1 1 0 002 0V7a1 1 0 00-1-1z" fill="currentColor"/></svg> Speak`;
}

/* ===== INIT ===== */
setTimeout(runFlow, 800);
